<div class="page-layout">
  <app-sidebar />
  <div class="main-content" style="padding:1.5rem;">

    <div class="topbar">
      <div>
        <h1 class="page-title">Kullanıcı Yönetimi</h1>
        <p class="page-sub">{{ totalElements }} kullanıcı listeleniyor</p>
      </div>
      <div class="topbar-actions">
        <button class="btn-primary" (click)="openCreate()">+ Yeni Kullanıcı</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="card" style="margin-bottom:1rem; display:flex; gap:12px; align-items:center;">
      <input type="text" [(ngModel)]="search" placeholder="Ad veya e-posta ara..." (keyup.enter)="onSearch()"
        style="flex:1; background:#12121a; border:0.5px solid #2e2e3e; border-radius:7px; padding:8px 12px; color:#f0f0f5; font-size:12px; outline:none;" />
      <select [(ngModel)]="selectedRole" (change)="onRoleFilter()"
        style="background:#12121a; border:0.5px solid #2e2e3e; border-radius:7px; padding:8px 12px; color:#9a9ab0; font-size:12px; cursor:pointer;">
        <option value="">Tüm Roller</option>
        <option value="ADMIN">Admin</option>
        <option value="CORPORATE">Corporate</option>
        <option value="INDIVIDUAL">Individual</option>
      </select>
      <button class="btn-outline" (click)="onSearch()">🔍 Ara</button>
    </div>

    <!-- Table -->
    <div class="card">
      <div *ngIf="loading" style="text-align:center; color:#6c63ff; padding:2rem;">Yükleniyor…</div>
      <table class="data-table" *ngIf="!loading">
        <thead>
          <tr>
            <th>#</th>
            <th>Kullanıcı</th>
            <th>Rol</th>
            <th>Telefon</th>
            <th>Kayıt Tarihi</th>
            <th>Durum</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users">
            <td>{{ user.id }}</td>
            <td>
              <div style="font-weight:500; color:#f0f0f5;">{{ user.fullName || user.email }}</div>
              <div style="font-size:11px; color:#4a4a6a;">{{ user.email }}</div>
            </td>
            <td>
              <span class="status-pill"
                [style.background]="user.roleType === 'ADMIN' ? '#2e1d4e' : user.roleType === 'CORPORATE' ? '#1a2e3e' : '#1a2e1a'"
                [style.color]="user.roleType === 'ADMIN' ? '#9c7be4' : user.roleType === 'CORPORATE' ? '#378add' : '#1d9e75'">
                {{ user.roleType }}
              </span>
            </td>
            <td>{{ user.gender || '-' }}</td>
            <td style="color:#7a7a9a; font-size:11px;">{{ user.id }}</td>
            <td>
              <span class="status-pill pill-green">Aktif</span>
            </td>
            <td style="display: flex; gap: 8px;">
                <button class="btn-outline" (click)="deleteUser(user.id)" style="font-size:11px; color: #e24b4a;">Sil</button>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Pagination -->
      <app-pagination 
        [page]="page" 
        [totalPages]="totalPages" 
        (pageChange)="onPageChange($event)">
      </app-pagination>
    </div>

    <!-- Create Modal -->
    <div *ngIf="showCreateModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:100;">
      <div class="card" style="width:420px; max-width:95vw;">
        <div class="card-title">Yeni Kullanıcı Oluştur</div>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <input type="text" [(ngModel)]="newUser.fullName" placeholder="Ad Soyad *"
            style="background:#12121a; border:0.5px solid #2e2e3e; border-radius:7px; padding:10px 12px; color:#f0f0f5; font-size:13px; outline:none;" />
          <input type="email" [(ngModel)]="newUser.email" placeholder="E-posta *"
            style="background:#12121a; border:0.5px solid #2e2e3e; border-radius:7px; padding:10px 12px; color:#f0f0f5; font-size:13px; outline:none;" />
          <input type="password" [(ngModel)]="newUser.password" placeholder="Şifre *"
            style="background:#12121a; border:0.5px solid #2e2e3e; border-radius:7px; padding:10px 12px; color:#f0f0f5; font-size:13px; outline:none;" />
          <select [(ngModel)]="newUser.roleType"
            style="background:#12121a; border:0.5px solid #2e2e3e; border-radius:7px; padding:10px 12px; color:#9a9ab0; font-size:13px; cursor:pointer;">
            <option value="INDIVIDUAL">Individual</option>
            <option value="CORPORATE">Corporate</option>
            <option value="ADMIN">Admin</option>
          </select>
          <select [(ngModel)]="newUser.gender"
            style="background:#12121a; border:0.5px solid #2e2e3e; border-radius:7px; padding:10px 12px; color:#9a9ab0; font-size:13px; cursor:pointer;">
            <option value="Male">Erkek</option>
            <option value="Female">Kadın</option>
          </select>
          <input type="number" [(ngModel)]="newUser.age" placeholder="Yaş"
            style="background:#12121a; border:0.5px solid #2e2e3e; border-radius:7px; padding:10px 12px; color:#f0f0f5; font-size:13px; outline:none;" />
          <div *ngIf="createError" style="color:#e24b4a; font-size:12px;">{{ createError }}</div>
          <div style="display:flex; gap:8px; justify-content:flex-end;">
            <button class="btn-outline" (click)="showCreateModal = false">İptal</button>
            <button class="btn-primary" (click)="createUser()">Oluştur</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
