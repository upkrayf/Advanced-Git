<div class="detail-container">
  <div class="product-info-panel">
    <a routerLink="/products" class="back-link">← Kataloğa Dön</a>
    <h2>{{ product.name }}</h2>
    <div class="sku-tag">SKU: {{ product.sku }}</div>
    <p class="desc">{{ product.description }}</p>
    <div class="price-big">{{ product.price }}</div>
  </div>

  <div class="ai-panel">
    <div class="chat-header">✨ Ürün Asistanı (Agentic AI)</div>
    <div class="chat-box">
      <div *ngFor="let msg of chatHistory" [ngClass]="msg.role === 'user' ? 'user-msg' : 'ai-msg'">
        {{ msg.text }}
      </div>
    </div>
    <div class="chat-input">
      <input [(ngModel)]="userQuery" (keyup.enter)="sendMessage()" placeholder="Bir soru sor...">
      <button (click)="sendMessage()">Gönder</button>
    </div>
  </div>
</div>
