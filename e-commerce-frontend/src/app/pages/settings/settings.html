<div class="settings-container">
  <h2>⚙️ Store Settings</h2>
  
  <div class="settings-group">
    <h3>Platform Configuration</h3>
    <div class="setting-item">
      <span>Store Status: <strong>Open</strong></span>
      <button class="toggle-btn">Close Store</button>
    </div>
    
    <div class="setting-item">
      <span>Maintenance Mode</span>
      <input type="checkbox">
    </div>
  </div>

  <div class="settings-group">
    <h3>Data Synchronization (ETL)</h3>
    <p>Last sync with Kaggle datasets: 2 hours ago</p>
    <button class="sync-btn">Force Sync Now</button>
  </div>
</div>
