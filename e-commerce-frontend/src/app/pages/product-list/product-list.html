<div class="products-container">
  
  <div class="header-section">
    <div>
      <h2>📦 Products Catalog</h2>
      <p>Manage your inventory</p>
    </div>
    <button class="add-product-btn">+ Add Product</button>
  </div>

  <div class="controls-section">
    
    <select class="custom-select category-select" [(ngModel)]="selectedCategory">
      <option value="All Categories">All Categories</option>
      <option value="Clothing">Clothing</option>
      <option value="Electronics">Electronics</option>
      <option value="Accessories">Accessories</option>
    </select>

    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" [(ngModel)]="searchText" placeholder="Search products...">
    </div>

    <select class="custom-select sort-select" [(ngModel)]="sortOption">
      <option value="default">Sort: Default</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="name-asc">Name: A to Z</option>
    </select>
  </div>

  <div class="products-grid">
    @for (p of filteredAndSortedProducts; track p.id) {
      <div class="product-card" (click)="goToDetail(p.id)">
        
        <div class="product-icon">{{ p.icon ? p.icon : '📦' }}</div>
        
        <div class="product-info">
          <h3>{{ p.name }}</h3>
          <div class="price-stock">
            <span class="price">{{ p.unit_price ? p.unit_price : p.price }} ₺</span>
          </div>
        </div>

      </div>
    } @empty {
      <div class="empty-state">
        <p>No products found matching your search or filter. 🕵️‍♂️</p>
      </div>
    }
  </div>

</div>
