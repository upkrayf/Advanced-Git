# ==============================================================
# DATAPULSE - DATABASE CONFIGURATION
# ==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/datapulse_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
# DİKKAT: Aşağıdaki şifreyi kendi MySQL şifrenle değiştir!
spring.datasource.password=admin

# ==============================================================
# HIBERNATE & JPA CONFIGURATION (Tabloları otomatik oluşturur)
# ==============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================================================
# SERVER CONFIGURATION
# ==============================================================
# Frontend 4200'de çalışır, Backend'in portu 8080 olsun
server.port=8080

# Konsol çıktılarını daha temiz görmek için
spring.main.banner-mode=off

# ETL veri yükleme dizini (ds1.csv .. ds6.tsv dosyalarını buraya ekleyebilirsiniz)
etl.data-dir=./data
